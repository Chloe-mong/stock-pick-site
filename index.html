<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 주식 종목추천</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <p class="badge">Demo Page</p>
      <h1>오늘의 주식 종목추천</h1>
      <p class="subtitle">
        학습용 예시 페이지입니다. 실제 투자 추천이 아닙니다.
      </p>
      <p id="today" class="date"></p>
    </header>

    <main>
      <section class="stock-list" id="stockList"></section>
    </main>

    <footer class="footer">
      <p>본 페이지는 예시 데이터로 제작되었습니다.</p>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>

<section class="contact-section">
  <h2>제휴 문의</h2>
  <p class="contact-desc">광고, 협업, 제휴 관련 문의를 남겨주세요.</p>

  <form
    class="contact-form"
    action="https://formspree.io/f/mdapzowg"
    method="POST"
  >
    <input
      type="email"
      name="email"
      placeholder="이메일 주소"
      required
    />

    <textarea
      name="message"
      rows="6"
      placeholder="문의 내용을 적어주세요."
      required
    ></textarea>

    <button type="submit">보내기</button>
  </form>
</section>
